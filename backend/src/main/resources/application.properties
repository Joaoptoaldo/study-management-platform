spring.application.name=study-management-platform

# Servidor
server.port=${SERVER_PORT:8080}

# Banco de dados MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# update -> cria/atualiza tabelas automaticamente (bom pra dev)
# validate -> só valida, não mexe no banco (use em produção)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Jackson (datas como string ISO, ex: "2025-01-15")
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false

# Logging (DEBUG em dev, troque pra INFO em produção)
logging.level.com.studyplatform=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS Allowed Origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# OpenAI Embeddings
openai.api.key=${OPENAI_API_KEY:}
openai.embedding.model=text-embedding-3-small

# ChromaDB Vector Store
chroma.url=${CHROMA_URL:http://localhost:8000}

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always

# OAuth2 Client Configurations
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-mock-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-mock-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-mock-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-mock-secret}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
