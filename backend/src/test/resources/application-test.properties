# Banco de dados in-memory H2 para testes
spring.datasource.url=jdbc:h2:mem:study_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Habilitar DDL auto para gerar as tabelas no banco H2 automaticamente nos testes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway desabilitado em testes para rodar testes rápidos sem migrações PostgreSQL no H2
spring.flyway.enabled=false

# JWT Secret estático específico para rodar testes sem precisar de variável de ambiente .env
JWT_SECRET=9a78a614ef68a2bc4f3a71b12bcf39c289ab71bc296e872d80d287bc1a2345bc
JWT_EXPIRATION=3600000
