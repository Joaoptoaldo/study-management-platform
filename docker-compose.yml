version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: study-mysql
    restart: always
    environment:
      MYSQL_DATABASE: studyplatform
      MYSQL_ROOT_PASSWORD: joaopedro
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: study-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://db:3306/studyplatform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: joaopedro
      JWT_SECRET: troque-por-uma-chave-secreta-longa-e-aleatoria-de-producao-de-preferencia
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: study-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
